name: Daily Long-Form Documentary

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check upload hour
        id: check
        run: echo "hour=$(date -u +%H)" >> $GITHUB_OUTPUT

      - name: Conditional run
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then exit 0; fi
          if [ "${{ steps.check.outputs.hour }}" = "22" ]; then exit 0; fi
          echo "Not scheduled hour, skipping"
          exit 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Decode YouTube credentials
        run: |
          echo "${{ secrets.CLIENT_SECRET_B64 }}" | base64 -d > client_secret.json
          echo "${{ secrets.TOKEN_B64 }}" | base64 -d > token_sejarah.json

      - name: Run long-form pipeline
        env:
          LLM_PROVIDER: gemini
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python -m src.pipeline_ai_long

      - name: Commit refreshed token (if changed)
        run: |
          if git diff --quiet token_sejarah.json 2>/dev/null; then
            echo "Token unchanged"
          else
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add token_sejarah.json
            git commit -m "auto: refresh YouTube token"
            git push
          fi
