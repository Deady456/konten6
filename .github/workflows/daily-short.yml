name: Daily Short Video

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Cache FFmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: |
            /usr/bin/ffmpeg
            /usr/bin/ffprobe
            /usr/lib/x86_64-linux-gnu/libav*
            /usr/lib/x86_64-linux-gnu/libsw*
            /usr/lib/x86_64-linux-gnu/libpostproc*
          key: ffmpeg-${{ runner.os }}-v1

      - name: Install FFmpeg
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Cache Whisper model
        id: cache-whisper
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: whisper-${{ runner.os }}-${{ hashFiles('config.yaml') }}
          restore-keys: |
            whisper-${{ runner.os }}-
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Decode YouTube credentials
        run: |
          echo "${{ secrets.CLIENT_SECRET_B64 }}" | base64 -d > client_secret.json
          echo "${{ secrets.TOKEN_B64 }}" | base64 -d > token_serenitymind.json

      - name: Run pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          ELEVENLABS_API_KEYS: ${{ secrets.ELEVENLABS_API_KEYS }}
        run: |
          python -m src.pipeline || python -m src.pipeline_ai

      - name: Commit state.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -f state.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "state.json unchanged"
          else
            git commit -m "auto: update state.json"
            git push
          fi

      - name: Commit refreshed token (if changed)
        run: |
          if git diff --quiet token_serenitymind.json 2>/dev/null; then
            echo "Token unchanged"
          else
            git add token_serenitymind.json
            git commit -m "auto: refresh YouTube token"
            git push
          fi
