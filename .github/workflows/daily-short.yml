name: Daily Short Video

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine pipeline type
        id: pipeline
        run: |
          HOUR=$(date -u +%H | sed 's/^0//')
          case "$HOUR" in
            3) echo "type=pexels" >> $GITHUB_OUTPUT ;;
            10) echo "type=pollination" >> $GITHUB_OUTPUT ;;
          esac

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Decode YouTube credentials
        run: |
          echo "${{ secrets.CLIENT_SECRET_B64 }}" | base64 -d > client_secret.json
          echo "${{ secrets.TOKEN_B64 }}" | base64 -d > token_sejarah.json

      - name: Run Pexels pipeline (fallback to Pollination)
        if: steps.pipeline.outputs.type == 'pexels'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          python -m src.pipeline || python -m src.pipeline_ai

      - name: Run Pollination pipeline
        if: steps.pipeline.outputs.type == 'pollination'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python -m src.pipeline_ai

      - name: Commit state.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -f state.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "state.json unchanged"
          else
            git commit -m "auto: update state.json"
            git push
          fi

      - name: Post to blog-web
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if [ ! -f state.json ]; then echo "state.json not found"; exit 0; fi
          if ! jq -e '.published | length > 0' state.json > /dev/null 2>&1; then echo "no published entries"; exit 0; fi
          BWD=/tmp/blog-web
          rm -rf $BWD
          git clone --depth=1 https://x-access-token:${PAT_TOKEN}@github.com/Deady456/blog-web.git $BWD
          jq -c '{video_id:(.published[-1].video_id//""), title:(.published[-1].title//""), topic:(.published[-1].topic//""), ts:(.published[-1].ts//""), channel:"konten6"}' state.json | python $BWD/add_post.py
          cd $BWD
          git add posts/
          if git diff --staged --quiet; then
            echo "blog-web: no changes"
          else
            git commit -m "auto: add post from konten6"
            git push
          fi

      - name: Commit refreshed token (if changed)
        run: |
          if git diff --quiet token_sejarah.json 2>/dev/null; then
            echo "Token unchanged"
          else
            git add token_sejarah.json
            git commit -m "auto: refresh YouTube token"
            git push
          fi
